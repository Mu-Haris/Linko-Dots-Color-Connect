<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotly - Connect & Match</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFF5F0 0%, #FFF0F5 50%, #F0F0FF 100%);
            min-height: 100vh;
            color: #2A2A30;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 24px;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #FF5252, #FF8E53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #2A2A30;
            margin-bottom: 4px;
        }
        .tagline {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 40px;
        }
        .description {
            font-size: 16px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            padding: 12px 28px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            color: #2A2A30;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .links a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 60px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LINKO</h1>
        <p class="subtitle">DOTS</p>
        <p class="tagline">COLOR CONNECT</p>
        <p class="description">
            A beautifully crafted dot-connecting puzzle game. Draw lines between same-colored dots,
            form loops for chain reactions, and journey through 100 handcrafted levels across 5 worlds.
        </p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="support.html">Support</a>
        </div>
        <footer>
            &copy; 2026 Random Kids. All rights reserved.
        </footer>
    </div>
</body>
</html>
